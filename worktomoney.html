<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薪水小偷換算表</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 360px;
            text-align: center;
        }
        h2 { color: #d63031; margin-bottom: 1.5rem; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label { display: block; font-size: 0.9rem; color: #5f6368; margin-bottom: 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0984e3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #74b9ff; }
        .display-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #e8eaed;
        }
        .time-text { font-size: 1.1rem; color: #3c4043; font-weight: 500; }
        .money-text {
            font-size: 2.8rem;
            color: #27ae60;
            font-weight: 800;
            margin: 10px 0;
        }
        .money-unit { font-size: 0.9rem; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="card">
    <h2>🥷 薪水小偷換算表</h2>
    
    <div class="input-group">
        <label>當前日期類型</label>
        <select id="dayType">
            <option value="weekday">平日 (前8H正常, 之後加班)</option>
            <option value="holiday">休息日 (加班費率制)</option>
        </select>
    </div>

    <div class="input-group">
        <label>您的時薪 (TWD)</label>
        <input type="number" id="hourlyRate" value="190">
    </div>
    
    <div class="input-group">
        <label>預計工作時長 (小時)</label>
        <select id="workHours"></select>
    </div>

    <button onclick="startCalculation()">開始計算</button>

    <div class="display-section">
        <div id="timeElapsed" class="time-text">點擊上方按鈕開始</div>
        <div id="moneyEarned" class="money-text">0.0</div>
        <div class="money-unit">目前已賺取金額 (元)</div>
    </div>
</div>
