<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Portfolio Dashboard | 個人資產現值監控</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            padding: 30px 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 850px; }
        h2 { font-size: 1.6rem; font-weight: 600; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; font-size: 1.05rem; }
        th, td { border-bottom: 1px solid #222; padding: 14px 12px; text-align: right; }
        th { color: #888; font-weight: normal; font-size: 0.95rem; }
        .text-left { text-align: left; }
        .shares { color: #e67e22; font-weight: bold; } 
        .up { color: #ff4d4d; } 
        .down { color: #00e676; } 
        .summary-box { background: #0a0a0a; padding: 25px; border-radius: 12px; border: 1px solid #222; }
        .summary-box p { margin: 12px 0; font-size: 1.1rem; color: #ccc; }
        .total-val { font-size: 2rem; font-weight: bold; color: #fff; }
        button { background-color: #1c1c1e; color: white; border: 1px solid #3a3a3c; padding: 12px 20px; border-radius: 6px; cursor: pointer; margin-top: 15px; font-size: 0.95rem; transition: background 0.2s; }
        button:hover { background-color: #2c2c2e; }
        #loading { color: #666; text-align: center; margin: 40px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>即時資產現值監控系統</h2>
    <div id="loading">正在讀取庫存與更新市場報價...</div>
    <table id="dataTable" style="display: none;">
        <thead>
            <tr><th class="text-left">資產名稱</th><th>代號</th><th>持有股數</th><th>即時市價</th><th>資產現值</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div class="summary-box" id="summaryBox" style="display: none;">
        <p>今日總資產現值： <span class="total-val" id="currentTotal">0</span> TWD</p>
        <p>昨日基準總資產： <span id="yesterdayTotal">無紀錄</span> TWD</p>
        <p>今日資產總漲跌： <strong id="dailyDiff">0</strong></p>
        <button onclick="saveTodayAsYesterday()">將當前現值設定為昨日收盤基準</button>
    </div>
</div>

<script>
    let currentTotalValue = 0;

    async function init() {
        try {
            const response = await fetch('portfolio.csv?t=' + new Date().getTime());
            if (!response.ok) throw new Error("未偵測到 portfolio.csv 檔案。");
            const csvText = await response.text();
            const rows = csvText.replace(/\r/g, '').trim().split('\n');
            const dataRows = rows.slice(1); 
            let tbodyHtml = '';
            currentTotalValue = 0;

            for (const row of dataRows) {
                const cols = row.split(',');
                if (cols.length < 3) continue;
                const stockId = cols[0].replace(/\s+/g, '').trim();
                const stockName = cols[1].trim();
                const shares = parseInt(cols[2].replace(/\s+/g, '').trim(), 10);
                
                const ticker = stockId + '.TW'; 
                const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(yfUrl)}`;
                
                let price = 0;
                try {
                    const priceRes = await fetch(proxyUrl);
                    const priceData = await priceRes.json();
                    price = priceData.chart.result[0].meta.regularMarketPrice;
                } catch (err) { price = 0; }

                const totalStr = (price * shares);
                currentTotalValue += totalStr;
                tbodyHtml += `<tr><td class="text-left">${stockName}</td><td>${stockId}</td><td class="shares">${shares.toLocaleString()}</td><td>${price > 0 ? price.toFixed(2) : 'N/A'}</td><td>${totalStr > 0 ? Math.round(totalStr).toLocaleString() : 'N/A'}</td></tr>`;
            }
            document.getElementById('tableBody').innerHTML = tbodyHtml;
            document.getElementById('currentTotal').innerText = Math.round(currentTotalValue).toLocaleString();
            calculateDiff();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';
            document.getElementById('summaryBox').style.display = 'block';
        } catch (error) { document.getElementById('loading').innerText = "系統錯誤：" + error.message; }
    }

    function calculateDiff() {
        const savedYesterday = localStorage.getItem('yesterdayTotalValue');
        const diffEl = document.getElementById('dailyDiff');
        const yestEl = document.getElementById('yesterdayTotal');
        if (savedYesterday) {
            const yesterdayNum = parseFloat(savedYesterday);
            yestEl.innerText = Math.round(yesterdayNum).toLocaleString();
            const diff = currentTotalValue - yesterdayNum;
            if (diff > 0) { diffEl.innerText = `▲ +${Math.round(diff).toLocaleString()}`; diffEl.className = 'up'; }
            else if (diff < 0) { diffEl.innerText = `▼ ${Math.round(diff).toLocaleString()}`; diffEl.className = 'down'; }
            else { diffEl.innerText = `0`; diffEl.className = ''; }
        }
    }

    function saveTodayAsYesterday() {
        if (currentTotalValue > 0) {
            localStorage.setItem('yesterdayTotalValue', currentTotalValue);
            alert("基準金額已成功記錄。");
            calculateDiff(); 
        }
    }

    // 啟動與自動刷新
    init();
    setInterval(init, 30000); // 每 30 秒重新執行一次 init()
</script>
</body>
</html>
