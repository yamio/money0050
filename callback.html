<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㄅ一的成長進度追蹤</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .stat-box {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
        }
        .paid { background-color: #e8f5e9; color: #2e7d32; }
        .countdown { background-color: #fff3e0; color: #ef6c00; }
        .number { font-size: 1.8rem; font-weight: bold; display: block; }
        .label { font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h2>時間進度條</h2>
    
    <div class="stat-box paid">
        <span class="label">已支付</span>
        <span class="number" id="paidMonths">0 個月</span>
    </div>

    <div class="stat-box countdown">
        <span class="label">倒數成年</span>
        <span class="number" id="remainingMonths">0 個月</span>
    </div>
</div>

<script>
    function calculateStats() {
        const today = new Date();
        
        // 1. 成年日期 (2016/08/01 + 18年 = 2034/08/01)
        const adultDate = new Date(2034, 7, 1); // 月份從0開始，7代表8月
        
        // 2. 支付起點 (民國114/04/20 = 2025/04/20)
        const startPayDate = new Date(2025, 3, 20); // 3代表4月

        // 計算月數差的函式
        function getMonthDiff(d1, d2) {
            let months = (d2.getFullYear() - d1.getFullYear()) * 12;
            months += d2.getMonth() - d1.getMonth();
            // 如果當天日期還沒到該月的20號(或目標日)，則月數不滿一個月不計入？
            // 這裡採用最直觀的月份相減
            return months;
        }

        // --- 已支付計算 ---
        let paidCount = 0;
        if (today >= startPayDate) {
            // 從 2025/04/20 開始算第一筆，所以要 +1
            paidCount = getMonthDiff(startPayDate, today) + 1;
        } else {
            paidCount = 0;
        }

        // --- 倒數成年計算 ---
        let remainingCount = getMonthDiff(today, adultDate);
        if (remainingCount < 0) remainingCount = 0;

        // 渲染到網頁
        document.getElementById('paidMonths').innerText = paidCount + " 個月";
        document.getElementById('remainingMonths').innerText = remainingCount + " 個月";
    }

    // 執行計算
    calculateStats();
</script>

</body>
</html>
