<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㄅ一的成長進度追蹤</title>
    <style>
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            width: 320px;
        }
        h2 { color: #34495e; margin-bottom: 2rem; font-size: 1.4rem; letter-spacing: 1px; }
        .stat-box {
            margin-bottom: 1.2rem;
            padding: 1.5rem;
            border-radius: 15px;
        }
        .paid { background-color: #ebfbee; color: #2b8a3e; border: 1px solid #d3f9d8; }
        .countdown { background-color: #fff4e6; color: #d9480f; border: 1px solid #ffe8cc; }
        .number { font-size: 2.2rem; font-weight: 800; display: block; margin-bottom: 5px; min-height: 2.5rem; }
        .label { font-size: 0.95rem; font-weight: bold; }
        .sub-text { font-size: 0.85rem; margin-top: 5px; display: block; opacity: 0.8; font-weight: 500; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>成長進度監測</h2>
    
    <div class="stat-box paid">
        <span class="label">已支付</span>
        <span class="number" id="paidMonths"></span>
    </div>

    <div class="stat-box countdown">
        <span class="label">倒數成年</span>
        <span class="number" id="remainingMonths"></span>
        <span id="remainingYears" class="sub-text"></span>
    </div>
</div>

<script>
    window.onload = function() {
        const now = new Date();
        const curY = now.getFullYear();
        const curM = now.getMonth(); 
        const curD = now.getDate();

        // 參數：2025/04/20 起算, 2034/08/01 成年
        const startY = 2025;
        const startM = 3; 
        const adultY = 2034;
        const adultM = 7; 

        // --- 已支付計算 ---
        let monthsPassed = (curY - startY) * 12 + (curM - startM);
        let finalPaid = monthsPassed;
        if (curD >= 20) {
            finalPaid += 1;
        }

        // --- 倒數成年計算 ---
        let monthsRemaining = (adultY - curY) * 12 + (adultM - curM);
        // 如果還沒到 20 日，這整個月都還在倒數中 (不扣掉)
        if (curD >= 20) {
            monthsRemaining -= 1;
        }

        // 安全限制
        if (finalPaid < 0) finalPaid = 0;
        if (monthsRemaining < 0) monthsRemaining = 0;

        const y = Math.floor(monthsRemaining / 12);
        const m = monthsRemaining % 12;

        // 寫入數據
        document.getElementById('paidMonths').innerText = finalPaid + " 個月";
        document.getElementById('remainingMonths').innerText = monthsRemaining + " 個月";
        
        if (monthsRemaining > 0) {
            document.getElementById('remainingYears').innerText = "(" + y + " 年 " + m + " 個月)";
        } else {
            document.getElementById('remainingYears').innerText = "(已成年)";
        }
    };
</script>

</body>
</html>
